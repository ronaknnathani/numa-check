name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME}"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o numa-check .

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" numa-check \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
